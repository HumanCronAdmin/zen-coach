<style>
*{margin:0;padding:0;box-sizing:border-box}

  background:#0f0f14;

  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;

<body>

<header>
  <h1>ZEN COACH</h1>
  <p>see clearly. act simply.</p>
</header>

<div id="chat-wrap">
  <deep-chat id="zen-chat"
    style="
      --message-docs-max-width: 100%;
      font-size: 0.95rem;
    "
    messageStyles='{
      "default": {
        "shared": {
          "bubble": {
            "maxWidth": "85%",
            "lineHeight": "1.6",
            "fontSize": "0.95rem"
          }
        },
        "ai": {
          "bubble": {
            "backgroundColor": "#1a1a24",
            "color": "#e8e0d4",
            "borderRadius": "2px 16px 16px 16px",
            "padding": "14px 18px"
          }
        },
        "user": {
          "bubble": {
            "backgroundColor": "#1e1e2e",
            "color": "#c8c0b4",
            "borderRadius": "16px 2px 16px 16px",
            "padding": "14px 18px"
          }
        }
      }
    }'
    inputAreaStyle='{"backgroundColor":"#13131a","borderTop":"1px solid #1e1e28","padding":"12px 16px"}'
    textInput='{
      "styles": {
        "container": {
          "backgroundColor": "#1a1a24",
          "borderRadius": "24px",
          "border": "1px solid #2a2a38",
          "color": "#e8e0d4",
          "paddingLeft": "18px",
          "fontSize": "0.95rem",
          "minHeight": "44px"
        },
        "focus": {
          "border": "1px solid #c4a35a44"
        }
      },
      "placeholder": {"text": "What is on your mind?", "style": {"color": "#555"}}
    }'
    submitButtonStyles='{
      "submit": {
        "container": {
          "default": {"backgroundColor":"#c4a35a","borderRadius":"50%","width":"40px","height":"40px","marginLeft":"8px"},
          "hover": {"backgroundColor":"#d4b36a"}
        },
        "svg": {"styles": {"default": {"filter":"brightness(0)"}}}
      }
    }'
    avatars='{"ai": {"styles": {"avatar": {"display": "none"}}}, "user": {"styles": {"avatar": {"display": "none"}}}}'
  >
  </deep-chat>
</div>

<footer>
  <span>Built by a human in Japan</span>
  &nbsp;&middot;&nbsp;
  <a href="mailto:contact@japanprofinder.com?subject=Zen Coach Feedback">Feedback</a>
  &nbsp;&middot;&nbsp;
  <a href="https://twitter.com/intent/tweet?text=Just%20tried%20Zen%20Coach%20%E2%80%94%20an%20AI%20life%20coach%20grounded%20in%20Zen%20philosophy.&url=" id="share-link" target="_blank" rel="noopener">Share</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/deep-chat@2.4.0/dist/deepChat.bundle.js"></script>
<script>
window.addEventListener("load", function(){
  const API_URL = "https://zen-coach-api.onrender.com";
  const chat = document.getElementById("zen-chat");
  const conversationHistory = [];

  if (!chat) { console.error("deep-chat element not found"); return; }

  // Fix share link with current URL
  document.getElementById("share-link").href =
    "https://twitter.com/intent/tweet?text=" +
    encodeURIComponent("Just tried Zen Coach — an AI life coach grounded in Zen philosophy.") +
    "&url=" + encodeURIComponent(window.location.href);

  // Wait for deep-chat component to be ready
  function initChat() {
    // Set connection
    chat.connect = {
      url: API_URL + "/api/chat",
      method: "POST",
      headers: {"Content-Type": "application/json"},
    };

    // Handle messages
    chat.requestInterceptor = (details) => {
      const userText = details.body.messages[details.body.messages.length - 1].text;
      conversationHistory.push({role: "user", text: userText});
      details.body = {messages: [...conversationHistory]};
      return details;
    };

    chat.responseInterceptor = (response) => {
      if(response.text){
        conversationHistory.push({role: "assistant", text: response.text});
      }
      return response;
    };

    // Load opening message
    fetch(API_URL + "/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({messages: []})
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.text && chat.setPlaceholderMessage){
        chat.setPlaceholderMessage({text: data.text, role: "ai"});
      }
    })
    .catch(function(){});
  }

  // deep-chat may need a moment to register as custom element
  if (customElements.get("deep-chat")) {
    initChat();
  } else {
    customElements.whenDefined("deep-chat").then(initChat);
  }
});
</script>
</body>
