<style>

  flex:1;

  border-radius:24px;

  padding:10px 18px;
  font-size:0.95rem;
  font-family:inherit;
  min-height:44px;
  outline:none;
  resize:none;

  border-color:#c4a35a44;

<body>

<header>
  <h1>ZEN COACH</h1>
  <p>see clearly. act simply.</p>
</header>

<div id="messages"></div>

<div id="input-area">
  <input type="text" id="user-input" placeholder="What is on your mind?" autocomplete="off">
  <button id="send-btn" aria-label="Send">
    <svg viewBox="0 0 24 24" fill="none" stroke="#0f0f14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>

<footer>
  <span>Built by a human in Japan</span>
  &middot;
  <a href="mailto:contact@japanprofinder.com?subject=Zen Coach Feedback">Feedback</a>
  &middot;
  <a href="https://twitter.com/intent/tweet?text=Just%20tried%20Zen%20Coach%20%E2%80%94%20an%20AI%20life%20coach%20grounded%20in%20Zen%20philosophy.&url=https%3A%2F%2Fhumancronadmin.github.io%2Fzen-coach%2F" target="_blank" rel="noopener">Share</a>
</footer>

<script>
(function(){
  var API_URL = "https://zen-coach-api.onrender.com";
  var messages = document.getElementById("messages");
  var input = document.getElementById("user-input");
  var btn = document.getElementById("send-btn");
  var history = [];
  var sending = false;

  function addMessage(text, role){
    var div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function send(){
    var text = input.value.trim();
    if(!text || sending) return;
    sending = true;
    btn.disabled = true;
    input.value = "";

    addMessage(text, "user");
    history.push({role:"user", text:text});

    var typing = addMessage("...", "ai typing");

    fetch(API_URL + "/api/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages:history})
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      messages.removeChild(typing);
      var reply = data.text || "...";
      addMessage(reply, "ai");
      history.push({role:"assistant", text:reply});
    })
    .catch(function(){
      messages.removeChild(typing);
      addMessage("Something went wrong. Try again.", "ai");
    })
    .finally(function(){
      sending = false;
      btn.disabled = false;
      input.focus();
    });
  }

  btn.addEventListener("click", send);
  input.addEventListener("keydown", function(e){
    if(e.key === "Enter" && !e.shiftKey){
      e.preventDefault();
      send();
    }
  });

  // Load opening message
  fetch(API_URL + "/api/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({messages:[]})
  })
  .then(function(r){ return r.json(); })
  .then(function(data){
    if(data.text) addMessage(data.text, "ai");
  })
  .catch(function(){
    addMessage("What brought you here?", "ai");
  });

  input.focus();
})();
</script>
